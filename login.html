<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Voyage - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-amber-50">
    <!-- Navigation Bar -->
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="w-8 h-8 bg-teal-700 rounded-md flex items-center justify-center">
                    <span class="text-white text-sm font-bold">V</span>
                </div>
                <h1 class="text-xl font-bold text-teal-900">Velvet Voyage</h1>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="flex w-full max-w-4xl">
            <!-- Left Side - Hero Image -->
            <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-b from-teal-900 to-teal-800 relative overflow-hidden rounded-l-2xl">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80" 
                     alt="Mountain landscape" class="w-full h-full object-cover opacity-70">
                
                <div class="absolute inset-0 bg-gradient-to-t from-teal-900/80 to-transparent flex flex-col justify-end p-12">
                    <div class="text-white">
                        <h2 class="text-3xl font-bold mb-4">Explore with Intent</h2>
                        <p class="text-sm leading-relaxed opacity-90">
                            Experience a travel assistant that understands the rhythm of nature and the precision of high-end logistics.
                        </p>
                    </div>
                </div>
            </div>

            <!-- Right Side - Login Form -->
            <div class="w-full lg:w-1/2 bg-white flex flex-col justify-center px-8 sm:px-12 py-12 rounded-r-2xl lg:rounded-r-2xl lg:rounded-l-none rounded-2xl">
                <div class="max-w-sm w-full">
                    <h2 class="text-3xl font-bold text-gray-900 mb-2">Welcome Back</h2>
                    <p class="text-gray-600 mb-8 text-sm">Sign in to your TravelGenie AI account</p>

                    <!-- Form -->
                    <form id="loginForm" class="space-y-5">
                    <div id="toastRoot"
                        class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 pointer-events-none">
                    </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-900 mb-2">Email address</label>
                            <input 
                                type="email" 
                                id="loginEmail"
                                placeholder="name@concierge.com"
                                class="w-full px-4 py-3 bg-amber-50 border border-amber-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                            >
                        </div>

                        <div>
                            <div class="flex justify-between items-center mb-2">
                                <label class="block text-sm font-semibold text-gray-900">Password</label>
                            </div>
                            <div class="relative">
                                <input 
                                    type="password" 
                                    id="loginPassword"
                                    placeholder="••••••••"
                                    class="w-full px-4 py-3 bg-amber-50 border border-amber-100 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent"
                                >
                                <button type="button" class="absolute right-3 top-3 text-gray-500 hover:text-gray-700">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <button 
                            type="submit"
                            class="w-full bg-teal-700 text-white font-semibold py-3 px-4 rounded-lg hover:bg-teal-800 transition mt-6"
                        >
                            Sign In
                        </button>
                    </form>

                    <!-- Footer Links -->
                    <p class="text-xs text-gray-500 text-center mt-8">
                        Don't have an account? <a href="index.html" class="text-teal-700 hover:text-teal-800 font-semibold">Create one</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
